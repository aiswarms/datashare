services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: datashare
      POSTGRES_USER: datashare
      POSTGRES_PASSWORD: datashare
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: datashare
      MINIO_ROOT_PASSWORD: datashare
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  api:
    build:
      context: ./api
    restart: unless-stopped
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://datashare:datashare@db:5432/datashare
    depends_on:
      - db
      - minio

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  worker:
    build:
      context: ./api
    restart: unless-stopped
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://datashare:datashare@db:5432/datashare
    depends_on:
      - db
      - minio
    command: sh -c "while true; do php bin/console app:purge-expired; sleep 3600; done"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
  
volumes:
  db_data:
  minio_data:
