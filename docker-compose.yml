services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: datashare
      POSTGRES_USER: datashare
      POSTGRES_PASSWORD: datashare
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    restart: unless-stopped
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://datashare:datashare@db:5432/datashare
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
  
volumes:
  db_data:
